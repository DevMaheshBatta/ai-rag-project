version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: rag_elasticsearch
    environment:
      - discovery.type=single-node        # no cluster needed for local dev
      - xpack.security.enabled=false      # disable auth for local dev only
      - ES_JAVA_OPTS=-Xms512m -Xmx512m   # cap RAM — default 4GB is too much
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data  # persist index across restarts

volumes:
  es_data:
